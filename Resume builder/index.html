<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Density Resume Builder — Build Your Future</title>
  <link rel="icon" href="/img/logo.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/logo.png">
  <link rel="apple-touch-icon" href="/img/logo.png">
  <meta name="description" content="Density crafts job-winning CVs in minutes. No templates, just results."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-hover: #4338CA;
      --bg-light: #F8FAFC;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden; 
      font-family: 'Inter', sans-serif;
      background: var(--bg-light); 
      color: #000;
      -webkit-font-smoothing: antialiased;
    }

    /* ── PREMIUM NAVBAR ── */
    .navbar {
      display: flex;
      align-items: center;
      height: 64px;
      padding: 0 32px;
      background: rgba(248, 250, 252, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #e2e8f0;
      box-shadow: 0 4px 12px -2px rgba(0,0,0,0.06);
      position: fixed;
      top: 0; width: 100%;
      z-index: 1000;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #000;
    }
    .brand-logo img { width: 32px; height: 32px; object-fit: contain; }
    .brand-logo span { font-size: 1.15rem; font-weight: 650; letter-spacing: -0.01em; }
    .brand-logo strong { font-weight: 800; }

    /* ── HERO SECTION ── */
    .hero {
      position: relative;
      background: var(--bg-light); 
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    /* Animated background elements */
    .hero::before {
      content: '';
      position: absolute;
      top: 20%;
      left: 10%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(79, 70, 229, 0.04) 0%, transparent 70%);
      animation: float 10s infinite alternate ease-in-out;
    }

    .hero h1 {
      font-size: 64px;
      font-weight: 800;
      color: #0F172A;
      margin-bottom: 16px;
      letter-spacing: -0.04em;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .hero p {
      font-size: 24px;
      color: #475569;
      max-width: 600px;
      margin-bottom: 40px;
      font-weight: 500;
      line-height: 1.4;
      animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) backwards;
    }

    .build-btn {
      display: inline-block;
      background-color: var(--primary);
      color: #fff; 
      padding: 16px 48px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 24px;
      font-weight: 700;
      box-shadow: 0 10px 25px -3px rgba(79, 70, 229, 0.4);
      transition: all 0.3s;
      animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) backwards;
    }

    .build-btn:hover {
      background-color: var(--primary-hover);
      transform: translateY(-4px);
      box-shadow: 0 20px 30px -4px rgba(79, 70, 229, 0.5);
    }

    /* ── GLOBAL BOTTOM BAR ── */
    .bottom-bar {
      width: 100%;
      height: 48px;
      background: #fff; 
      border-top: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      padding: 0 32px;
      position: fixed;
      bottom: 0;
      left: 0;
      z-index: 1000;
    }
    .bottom-bar span {
      font-size: 11px;
      color: #64748b;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    /* ANIMATIONS */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      from { transform: translate(0, 0); }
      to { transform: translate(40px, 40px); }
    }
    
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="brand-logo">
      <img src="img/logo.png" alt="Density Logo">
      <span>Density <strong>Resume Builder</strong></span>
    </a>
  </nav>

  <!-- HERO SECTION -->
  <section class="hero">
    <h1>Build Resume</h1>
    <p>Density crafts job-winning CVs in minutes. No templates, just results.</p>
    <a href="templates.html" class="build-btn">Build Resume</a>
  </section>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <span>© 2026 Density Resume Builder • Designed for Success</span>
  </div>

</body>
</html>

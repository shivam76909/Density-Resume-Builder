<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Density Resume Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="js/loader.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-light: #F8FAFC;
            --text-dark: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
        }

        /* Navbar */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            padding: 0 40px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #000;
            font-weight: 800;
            font-size: 18px;
        }

        .brand-logo img {
            width: 32px;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: var(--primary);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .btn-logout {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
        }

        /* Main Dashboard */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
        }

        .welcome-text h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .welcome-text p {
            color: var(--text-muted);
        }

        .btn-new {
            background: var(--primary);
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        .btn-new:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* Resumes Grid */
        .resumes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 32px;
        }

        .resume-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .resume-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            border-color: var(--primary);
        }

        .resume-preview-thumb {
            height: 320px;
            background: #F1F5F9;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border);
        }

        .resume-preview-thumb i {
            font-size: 48px;
            color: #CBD5E1;
        }

        .resume-info {
            padding: 20px;
        }

        .resume-info h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .resume-info p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .resume-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .action-icon {
            color: var(--text-muted);
            font-size: 14px;
            transition: color 0.2s;
        }

        .action-icon:hover {
            color: var(--primary);
        }

        .action-icon.delete:hover {
            color: #EF4444;
        }

        .empty-state {
            text-align: center;
            padding: 100px 0;
            grid-column: 1 / -1;
        }

        .empty-state i {
            font-size: 64px;
            color: #E2E8F0;
            margin-bottom: 24px;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="brand-logo">
            <img src="img/logo.png" alt="Density Logo"
                onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiM0ZjQ2ZTUiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48cGF0aCBkPSJNMTQgMmw3IDd2MTRBMiAyIDAgMCAxIDE5IDI1SDFhMSAxIDAgMCAxIC0xLTFWNGEyIDIgMCAwIDEgMi0yaDl0MCAwTDE0IDJ2N2w3IDciLz48L3N2Zz4='">
            <span>Density <strong>Dashboard</strong></span>
        </a>
        <div class="user-menu">
            <a href="index.html" class="btn-logout">Logout</a>
            <div class="user-avatar" id="user-initials">JD</div>
        </div>
    </nav>

    <main class="dashboard-container">
        <div class="dashboard-header">
            <div class="welcome-text">
                <h1 id="user-greeting">Hi, John!</h1>
                <p>Welcome back to your workspace.</p>
            </div>
            <a href="templates.html" class="btn-new">
                <i class="fas fa-plus"></i> Create New
            </a>
        </div>

        <div class="resumes-grid" id="resumes-list">
            <!-- Content loaded via JavaScript -->
            <div class="empty-state" style="display: none;" id="empty-msg">
                <i class="fas fa-file-invoice"></i>
                <h3>No Resumes Yet</h3>
                <p>Start your career journey by creating your first resume.</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, onAuthStateChanged, signOut } from "./js/firebase-config.js";
        import { getUserResumes } from "./js/resume-service.js";

        const userGreeting = document.getElementById('user-greeting');
        const userInitials = document.getElementById('user-initials');
        const logoutBtn = document.querySelector('.btn-logout');
        const resumesList = document.getElementById('resumes-list');
        const emptyMsg = document.getElementById('empty-msg');

        // Protect the page: Check if user is logged in
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // User is signed in
                const displayName = user.displayName || user.email.split('@')[0];
                userGreeting.innerText = `Hi, ${displayName}!`;
                userInitials.innerText = displayName.substring(0, 2).toUpperCase();

                // Load real resumes
                loadResumes();
            } else {
                window.location.href = "auth.html";
            }
        });

        async function loadResumes() {
            try {
                const resumes = await getUserResumes();
                resumesList.innerHTML = ''; // Clear previous

                if (resumes.length === 0) {
                    emptyMsg.style.display = 'block';
                    return;
                }

                emptyMsg.style.display = 'none';

                const templateMapping = {
                    "Professional Teal": { file: "builder-teal.html", img: "img/template2.png" },
                    "Executive Dark": { file: "builder-dark.html", img: "img/template3.jpg" },
                    "Modern Beige": { file: "builder-modern.html", img: "img/template-modern-beige.jpg" },
                    "Minimalist Classic": { file: "builder-minimalist.html", img: "img/template1.jpg" },
                    "Monochrome Clean": { file: "builder-monochrome.html", img: "img/template5.jpg" },
                    "Creative Peach": { file: "builder-peach.html", img: "img/template6.jpg" },
                    "Modern Textual": { file: "builder-textual.html", img: "img/template8.jpg" },
                    "Contemporary Cream": { file: "builder-cream.html", img: "img/template7.jpg" }
                };

                resumes.forEach(res => {
                    const templateData = templateMapping[res.template] || { file: "builder-teal.html", img: "img/template2.png" };
                    const editUrl = `${templateData.file}?id=${res.id}`;

                    // Use dynamic snapshot if available, otherwise fallback to template preview
                    const previewImg = res.snapshot || templateData.img;

                    const card = document.createElement('div');
                    card.className = 'resume-card';
                    card.onclick = (e) => {
                        if (!e.target.closest('.action-icon')) {
                            window.location.href = editUrl;
                        }
                    };

                    card.innerHTML = `
                        <div class="resume-preview-thumb" style="background: url('${previewImg}'); background-size: cover; background-position: top;">
                        </div>
                        <div class="resume-info">
                            <h3>${res.title || 'Untitled Resume'}</h3>
                            <p>${res.template || 'Density Template'}</p>
                            <div class="resume-actions">
                                <a href="${editUrl}" class="action-icon" title="Edit"><i class="fas fa-edit"></i></a>
                                <a href="#" class="action-icon" title="Download"><i class="fas fa-download"></i></a>
                                <a href="#" class="action-icon delete" title="Delete" data-id="${res.id}"><i class="fas fa-trash-alt"></i></a>
                            </div>
                        </div>
                    `;
                    resumesList.appendChild(card);
                });

                // Attach delete events
                document.querySelectorAll('.action-icon.delete').forEach(btn => {
                    btn.onclick = async (e) => {
                        e.preventDefault();
                        const id = btn.getAttribute('data-id');
                        if (confirm("Are you sure you want to delete this resume?")) {
                            const { deleteResume } = await import("./js/resume-service.js");
                            await deleteResume(id);
                            loadResumes(); // Reload
                        }
                    };
                });

            } catch (err) {
                console.error("Failed to load resumes:", err);
            }
        }

        // Logout logic
        logoutBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            try {
                await signOut(auth);
                window.location.href = "index.html";
            } catch (error) {
                console.error("Logout Error:", error);
            }
        });
    </script>
</body>

</html>

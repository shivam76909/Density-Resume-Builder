<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills | Density Resume Builder</title>
  <meta name="description" content="Add your professional skills to your resume." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&family=Outfit:wght@700;800&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --primary: #2563EB;
      --primary-hover: #1e40af;
      --bg-light: #fdfdfb;
      --text-main: #0f172a;
      --text-muted: #475569;
      --border-color: #e2e8f0;
      --card-bg: #ffffff;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-light);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      min-height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: row;
    }

    .builder-container {
      flex: 1;
      display: flex;
      margin-left: 245px;
    }

    /* Sidebar Styles */
    /* Sidebar Styles */
    .sidebar-panel {
      width: 245px;
      background: #0B1020;
      color: white;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      padding: 32px 24px;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 50;
      overflow-y: auto;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      margin-bottom: 48px;
    }

    .sidebar-logo .brand-title {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .sidebar-logo .brand-title span:first-child {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: #ffffff;
      letter-spacing: -0.02em;
    }

    .sidebar-logo .brand-title span:last-child {
      font-weight: 400;
      font-size: 14px;
      color: #94a3b8;
    }

    /* Vertical Stepper */
    .sidebar-stepper {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .sidebar-step {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      position: relative;
      padding: 10px 12px;
      border-radius: 12px;
      transition: all 0.2s;
    }

    .sidebar-step-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      transition: all 0.2s;
    }

    .sidebar-step-icon svg {
      width: 20px;
      height: 20px;
      stroke-width: 2;
    }

    .sidebar-step-text {
      font-size: 14px;
      font-weight: 600;
      color: #94a3b8;
      transition: all 0.2s;
    }

    .sidebar-step.active {
      background: #10b981;
    }

    .sidebar-step.active .sidebar-step-icon {
      color: white;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
    }

    .sidebar-step.active .sidebar-step-text {
      color: white;
      font-weight: 700;
    }

    .sidebar-step:hover:not(.active) {
      background: rgba(255, 255, 255, 0.05);
    }

    .sidebar-step:hover:not(.active) .sidebar-step-text {
      color: white;
    }

    /* Sidebar Footer */
    .sidebar-footer {
      margin-top: auto;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .sidebar-footer-links {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 10px;
    }

    .sidebar-footer-link {
      color: #ffffff;
      text-decoration: underline;
      transition: opacity 0.2s;
    }

    .sidebar-footer-link:hover {
      opacity: 0.8;
    }

    .sidebar-footer-sep {
      color: rgba(255, 255, 255, 0.3);
      font-weight: 300;
    }

    .sidebar-copyright {
      font-size: 10px;
      color: #64748b;
      margin-top: 12px;
      line-height: 1.4;
    }

    .form-panel {
      flex: 1.8;
      background: #ffffff;
      padding: 35px 48px 60px;
      max-width: 1100px;
    }

    .step-header {
      margin-bottom: 48px;
    }

    .step-header h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 32px;
      font-weight: 900;
      line-height: 1.1;
      color: var(--text-main);
      margin-bottom: 12px;
      letter-spacing: -0.04em;
    }

    .step-header p {
      font-size: 16px;
      color: #1e293b;
      line-height: 1.6;
      margin: 0;
    }

    .form-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 32px;
    }

    .skill-input-row {
      display: grid;
      grid-template-columns: 1fr 150px 40px;
      gap: 12px;
      align-items: end;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #1e293b;
    }

    .form-input {
      background: #ffffff;
      border: 1px solid #94a3b8;
      border-radius: 4px;
      padding: 13px 16px;
      font-size: 15px;
      color: var(--text-main);
      font-weight: 500;
      transition: all 0.2s;
      outline: none;
      width: 100%;
    }

    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .btn-add-skill {
      background: #f1f5f9;
      color: #2563EB;
      border: 1px dashed #2563EB;
      padding: 12px;
      border-radius: 4px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      width: 100%;
      transition: all 0.2s;
    }

    .btn-add-skill:hover {
      background: #e2e8f0;
    }

    .btn-remove-skill {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 18px;
      padding: 10px;
    }

    .btn-change-template {
      background: transparent;
      color: #2563EB;
      font-size: 14px;
      font-weight: 700;
      text-decoration: underline;
      cursor: pointer;
      display: inline-block;
      transition: color 0.2s;
    }

    .btn-change-template:hover {
      color: #1d4ed8;
    }

    .preview-panel {
      flex: 1;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 40px 40px 24px;
      position: sticky;
      top: 0;
      height: 100vh;
      gap: 20px;
    }

    .preview-card {
      background: white;
      height: 100%;
      max-height: 500px;
      aspect-ratio: 1 / 1.414;
      border-radius: 12px;
      box-shadow: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      border: 1px solid #000000;
      margin-top: 40px;
    }

    .builder-footer {
      margin-top: 48px;
      display: flex;
      justify-content: flex-end;
    }

    .btn-footer-back {
      color: #2563EB;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      transition: all 0.2s;
    }

    .btn-footer-next {
      background: var(--primary);
      color: white;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
    }

    .btn-footer-next:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    /* Autocomplete Dropdown */
    .autocomplete-wrapper {
      position: relative;
    }

    .autocomplete-list {
      position: absolute;
      top: calc(100% + 2px);
      left: 0;
      right: 0;
      background: #ffffff;
      border: 1px solid #94a3b8;
      border-radius: 4px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.10);
      z-index: 999;
      max-height: 220px;
      overflow-y: auto;
      display: none;
    }

    .autocomplete-list.open {
      display: block;
    }

    .autocomplete-item {
      padding: 11px 16px;
      font-size: 14px;
      color: #1e293b;
      cursor: pointer;
      transition: background 0.15s;
    }

    .autocomplete-item:hover,
    .autocomplete-item.active {
      background: #f1f5f9;
    }

    

    

        @media (max-width: 1024px) {

            .main-sections {
                grid-template-columns: 1fr;
                padding: 40px 24px;
            }
        }
</style>

  <script>
    function updatePreview() {
      const skillRows = document.querySelectorAll('.skill-input-row');
      const skills = [];
      skillRows.forEach(row => {
        const name = row.querySelector('input').value;
        const level = row.querySelector('select').value;
        if (name) {
          skills.push({ name, level });
        }
      });

      // Save to localStorage
      const resumeData = JSON.parse(localStorage.getItem('resumeData') || '{}');
      resumeData.skills = skills;
      localStorage.setItem('resumeData', JSON.stringify(resumeData));
    }

    function loadSavedData() {
      const resumeData = JSON.parse(localStorage.getItem('resumeData') || '{}');
      if (resumeData.skills && resumeData.skills.length > 0) {
        const skillList = document.getElementById('skillList');
        skillList.innerHTML = ''; // Clear initial row
        resumeData.skills.forEach(skill => {
          const div = document.createElement('div');
          div.className = 'skill-input-row';
          div.innerHTML = `
            <div class="form-group autocomplete-wrapper">
              <label>Skill Name</label>
              <input maxlength="60" type="text" class="form-input" placeholder="e.g. JavaScript" value="${skill.name}" oninput="skillAutocomplete(this); updatePreview()" onblur="hideSkillList(this)" onkeydown="skillAcKeydown(event, this)">
              <div class="autocomplete-list"></div>
            </div>
            <div class="form-group">
              <label>Level</label>
              <select class="form-input" onchange="updatePreview()">
                <option ${skill.level === 'Beginner' ? 'selected' : ''}>Beginner</option>
                <option ${skill.level === 'Intermediate' ? 'selected' : ''}>Intermediate</option>
                <option ${skill.level === 'Advanced' ? 'selected' : ''}>Advanced</option>
                <option ${skill.level === 'Expert' ? 'selected' : ''}>Expert</option>
              </select>
            </div>
            <button type="button" class="btn-remove-skill" onclick="this.parentElement.remove(); updatePreview();">×</button>
          `;
          skillList.appendChild(div);
        });
      } else {
        // Ensure at least one empty row has the oninput
        const firstInput = document.querySelector('.skill-input-row input');
        const firstSelect = document.querySelector('.skill-input-row select');
        if (firstInput) {
          firstInput.setAttribute('oninput', 'skillAutocomplete(this); updatePreview()');
          firstInput.setAttribute('onblur', 'hideSkillList(this)');
          firstInput.setAttribute('onkeydown', 'skillAcKeydown(event, this)');
        }
        if (firstSelect) firstSelect.setAttribute('onchange', 'updatePreview()');
      }
    }

    function goBack(page) {
      const urlParams = new URLSearchParams(window.location.search);
      const template = urlParams.get('template') || 'default';
      window.location.href = `${page}?template=${template}`;
    }

    function addSkill() {
      const skillList = document.getElementById('skillList');
      const div = document.createElement('div');
      div.className = 'skill-input-row';
      div.innerHTML = `
        <div class="form-group autocomplete-wrapper">
          <label>Skill Name</label>
          <input maxlength="60" type="text" class="form-input" placeholder="e.g. Photoshop" oninput="skillAutocomplete(this); updatePreview()" onblur="hideSkillList(this)" onkeydown="skillAcKeydown(event, this)">
          <div class="autocomplete-list"></div>
        </div>
        <div class="form-group">
          <label>Level</label>
          <select class="form-input" onchange="updatePreview()">
            <option>Beginner</option>
            <option>Intermediate</option>
            <option selected>Advanced</option>
            <option>Expert</option>
          </select>
        </div>
        <button type="button" class="btn-remove-skill" onclick="this.parentElement.remove(); updatePreview();">×</button>
      `;
      skillList.appendChild(div);
      updatePreview();
    }

    function validateAndContinue() {
      const urlParams = new URLSearchParams(window.location.search);
      const template = urlParams.get('template') || 'default';
      window.location.href = `builder-references.html?template=${template}`;
    }

    // Template Mapping
    const templateMap = {
      'cream': { name: 'Contemporary Cream', img: 'img/review-temp7.png' },
      'dark': { name: 'Executive Dark', img: 'img/template3.jpg' },
      'modern': { name: 'Modern Beige', img: 'img/template-modern-beige.jpg' },
      'minimalist': { name: 'Minimalist Classic', img: 'img/template1.jpg' },
      'monochrome': { name: 'Monochrome Clean', img: 'img/template5.jpg' },
      'peach': { name: 'Creative Peach', img: 'img/template6.jpg' },
      'teal': { name: 'Professional Teal', img: 'img/template2.png' },
      'textual': { name: 'Modern Textual', img: 'img/template8.jpg' },
      '9': { name: 'Corporate Modern', img: 'img/template9.png' },
      '10': { name: 'Elite Technical', img: 'img/template10.png' },
      '11': { name: 'Refined Professional', img: 'img/template11.png' },
      '12': { name: 'Artistic Ochre', img: 'img/template12.png' },
      '13': { name: 'Metro Modern', img: 'img/template13.png' },
      '14': { name: 'Executive Slate', img: 'img/template14.png' },
      '15': { name: 'Functional Clean', img: 'img/template15.png' },
      '16': { name: 'Teal Sidebar', img: 'img/template16.png' },
      '17': { name: 'Elegant Editorial', img: 'img/template17.png' },
      '18': { name: 'Compact Creative', img: 'img/template18.png' },
      'default': { name: 'Contemporary Cream', img: 'img/review-temp7.png' }
    };

    function loadSelectedTemplate() {
      const urlParams = new URLSearchParams(window.location.search);
      let templateId = urlParams.get('template') || 'default';

      if (!templateMap[templateId]) {
        templateId = 'default';

    let activeSkillAcIdx = -1;

    function skillAutocomplete(input) {
      const val = input.value.trim().toLowerCase();
      const list = input.nextElementSibling;
      list.innerHTML = '';
      activeSkillAcIdx = -1;
      if (!val) { list.classList.remove('open'); return; }

      const matches = SKILLS.filter(s => s.toLowerCase().includes(val)).slice(0, 8);
      if (!matches.length) { list.classList.remove('open'); return; }

      matches.forEach(skill => {
        const item = document.createElement('div');
        item.className = 'autocomplete-item';
        item.textContent = skill;
        item.addEventListener('mousedown', (e) => {
          e.preventDefault(); // Prevent input blur before click registers
          selectSkill(input, skill);
        });
        list.appendChild(item);
      });
      list.classList.add('open');
    }

    function selectSkill(input, skill) {
      input.value = skill;
      const list = input.nextElementSibling;
      list.classList.remove('open');
      updatePreview();
    }

    function hideSkillList(input) {
      setTimeout(() => {
        const list = input.nextElementSibling;
        if (list) list.classList.remove('open');
      }, 150);
    }

    function skillAcKeydown(e, input) {
      const list = input.nextElementSibling;
      if (!list) return;
      const items = list.querySelectorAll('.autocomplete-item');
      if (!items.length || !list.classList.contains('open')) return;

      if (e.key === 'ArrowDown') {
        activeSkillAcIdx = Math.min(activeSkillAcIdx + 1, items.length - 1);
        updateActiveSkillItem(items);
      } else if (e.key === 'ArrowUp') {
        activeSkillAcIdx = Math.max(activeSkillAcIdx - 1, 0);
        updateActiveSkillItem(items);
      } else if (e.key === 'Enter' && activeSkillAcIdx >= 0) {
        e.preventDefault();
        selectSkill(input, items[activeSkillAcIdx].textContent);
      }
    }

    function updateActiveSkillItem(items) {
      items.forEach((el, i) => {
        el.classList.toggle('active', i === activeSkillAcIdx);
      });
    }
  </script>

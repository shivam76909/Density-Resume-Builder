<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up — Density Resume Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="js/loader.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-light: #F8FAFC;
            --text-dark: #0F172A;
            --text-muted: #64748B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* ── Navbar (matches home page) ── */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            padding: 0 48px;
            background: #ffffff;
            width: 100%;
            border-bottom: 1px solid #f1f5f9;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #000;
        }

        .brand-title {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .brand-title span:first-child {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 20px;
            color: #0f172a;
            letter-spacing: -0.02em;
        }

        .brand-title span:last-child {
            font-weight: 400;
            font-size: 15px;
            color: #475569;
        }

        .navbar-back {
            color: #475569;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .navbar-back:hover {
            color: #2563eb;
        }

        /* ── Page body centred area ── */
        .page-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 48px;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            z-index: 10;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-header img {
            width: 48px;
            margin-bottom: 16px;
        }

        .brand-header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .brand-header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
        }

        .tabs {
            display: flex;
            background: #F1F5F9;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 32px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #fff;
            color: var(--text-dark);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
            font-size: 14px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1px solid #E2E8F0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .social-login {
            margin-top: 32px;
            border-top: 1px solid #E2E8F0;
            padding-top: 32px;
            text-align: center;
        }

        .social-login p {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: var(--text-dark);
            border: 1px solid #E2E8F0;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: background 0.2s;
        }

        .btn-google:hover {
            background: #F8FAFC;
        }

        .btn-google img {
            width: 18px;
        }

        #signup-form {
            display: none;
        }

        /* back-home removed — now in navbar */

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
                border-radius: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <!-- Top Navbar -->
    <nav class="navbar">
        <a href="index.html" class="brand-logo">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:40px;height:40px;">
                <rect x="5" y="5" width="28" height="28" fill="#000" />
                <rect x="37" y="37" width="28" height="28" fill="#000" />
                <rect x="69" y="37" width="28" height="28" fill="#000" />
                <rect x="37" y="69" width="28" height="28" fill="#000" />
                <rect x="0" y="0" width="30" height="30" fill="#7c3aed" />
                <rect x="32" y="32" width="30" height="30" fill="#7c3aed" />
                <rect x="64" y="32" width="30" height="30" fill="#7c3aed" />
                <rect x="32" y="64" width="30" height="30" fill="#7c3aed" />
            </svg>
            <div class="brand-title">
                <span>Density</span>
                <span>Resume Builder</span>
            </div>
        </a>
    </nav>

    <div class="page-center">
        <div class="auth-card">
            <div class="brand-header">
                <h1>Welcome Back</h1>
                <p id="auth-subtitle">Log in to your Density account</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="far fa-envelope"></i>
                        <input type="email" placeholder="name@company.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Sign In</button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i class="far fa-user"></i>
                        <input type="text" placeholder="John Doe" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="far fa-envelope"></i>
                        <input type="email" placeholder="name@company.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Create Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Create Account</button>
            </form>

            <div class="social-login">
                <p>Or continue with</p>
                <button class="btn-google">
                    <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#EA4335"
                            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                        <path fill="#4285F4"
                            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                        <path fill="#FBBC05"
                            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                        <path fill="#34A853"
                            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                        <path fill="none" d="M0 0h48v48H0z" />
                    </svg>
                    Continue with Google
                </button>
            </div>
        </div>
    </div><!-- /page-center -->

    <script type="module">
        import {
            auth,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            GoogleAuthProvider,
            signInWithPopup,
            onAuthStateChanged,
            updateProfile
        } from "./js/firebase-config.js";

        // Tab Switching Logic
        window.switchTab = function (tab) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const subtitle = document.getElementById('auth-subtitle');
            const tabBtns = document.querySelectorAll('.tab-btn');
            const headerText = document.querySelector('.brand-header h1');

            tabBtns.forEach(btn => btn.classList.remove('active'));

            if (tab === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                subtitle.innerText = 'Log in to your Density account';
                headerText.innerText = 'Welcome Back';
                tabBtns[0].classList.add('active');
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                subtitle.innerText = 'Create your free account in seconds';
                headerText.innerText = 'Get Started';
                tabBtns[1].classList.add('active');
            }
        }

        // Redirect if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "dashboard.html";
            }
        });

        // Sign Up Logic
        const signupForm = document.getElementById('signup-form');
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = signupForm.querySelector('input[type="email"]').value;
            const password = signupForm.querySelector('input[type="password"]').value;
            const name = signupForm.querySelector('input[type="text"]').value;

            try {
                // 1. Create the account
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);

                // 2. Try to update name (optional, don't block if it fails)
                try {
                    await updateProfile(userCredential.user, { displayName: name });
                } catch (profileErr) {
                    console.error("Profile update failed but account was created:", profileErr);
                }

                // 3. Redirect to dashboard
                window.location.href = "dashboard.html";
            } catch (error) {
                console.error("Signup error:", error);
                if (error.code === 'auth/network-request-failed') {
                    alert("Network error. Please check your internet and try again. It might take a moment to connect.");
                } else {
                    alert(error.message);
                }
            }
        });

        // Login Logic
        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = loginForm.querySelector('input[type="email"]').value;
            const password = loginForm.querySelector('input[type="password"]').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "dashboard.html";
            } catch (error) {
                alert("Login Failed: " + error.message);
            }
        });

        // Google Login Logic
        const googleBtn = document.querySelector('.btn-google');
        googleBtn.addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "dashboard.html";
            } catch (error) {
                alert(error.message);
            }
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up — Density Resume Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="js/loader.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-light: #F8FAFC;
            --text-dark: #0F172A;
            --text-muted: #64748B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
            background-size: cover;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            z-index: 10;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-header img {
            width: 48px;
            margin-bottom: 16px;
        }

        .brand-header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .brand-header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
        }

        .tabs {
            display: flex;
            background: #F1F5F9;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 32px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #fff;
            color: var(--text-dark);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
            font-size: 14px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1px solid #E2E8F0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .social-login {
            margin-top: 32px;
            border-top: 1px solid #E2E8F0;
            padding-top: 32px;
            text-align: center;
        }

        .social-login p {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: var(--text-dark);
            border: 1px solid #E2E8F0;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: background 0.2s;
        }

        .btn-google:hover {
            background: #F8FAFC;
        }

        .btn-google img {
            width: 18px;
        }

        #signup-form {
            display: none;
        }

        .back-home {
            position: absolute;
            top: 24px;
            left: 24px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-home:hover {
            color: #fff;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
                border-radius: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>

    <div class="auth-card">
        <div class="brand-header">
            <img src="img/logo.png" alt="Density Logo"
                onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiM0ZjQ2ZTUiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48cGF0aCBkPSJNMTQgMmw3IDd2MTRBMiAyIDAgMCAxIDE5IDI1SDFhMSAxIDAgMCAxIC0xLTFWNGEyIDIgMCAwIDEgMi0yaDl0MCAwTDE0IDJ2N2w3IDciLz48L3N2Zz4='">
            <h1>Welcome Back</h1>
            <p id="auth-subtitle">Log in to your Density account</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="login-form">
            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="far fa-envelope"></i>
                    <input type="email" placeholder="name@company.com" required>
                </div>
            </div>
            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <!-- Signup Form -->
        <form id="signup-form">
            <div class="input-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i class="far fa-user"></i>
                    <input type="text" placeholder="John Doe" required>
                </div>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="far fa-envelope"></i>
                    <input type="email" placeholder="name@company.com" required>
                </div>
            </div>
            <div class="input-group">
                <label>Create Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn-submit">Create Account</button>
        </form>

        <div class="social-login">
            <p>Or continue with</p>
            <button class="btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
                Google Account
            </button>
        </div>
    </div>

    <script type="module">
        import {
            auth,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            GoogleAuthProvider,
            signInWithPopup,
            onAuthStateChanged,
            updateProfile
        } from "./js/firebase-config.js";

        // Tab Switching Logic
        window.switchTab = function (tab) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const subtitle = document.getElementById('auth-subtitle');
            const tabBtns = document.querySelectorAll('.tab-btn');
            const headerText = document.querySelector('.brand-header h1');

            tabBtns.forEach(btn => btn.classList.remove('active'));

            if (tab === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                subtitle.innerText = 'Log in to your Density account';
                headerText.innerText = 'Welcome Back';
                tabBtns[0].classList.add('active');
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                subtitle.innerText = 'Create your free account in seconds';
                headerText.innerText = 'Get Started';
                tabBtns[1].classList.add('active');
            }
        }

        // Redirect if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "dashboard.html";
            }
        });

        // Sign Up Logic
        const signupForm = document.getElementById('signup-form');
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = signupForm.querySelector('input[type="email"]').value;
            const password = signupForm.querySelector('input[type="password"]').value;
            const name = signupForm.querySelector('input[type="text"]').value;

            try {
                // 1. Create the account
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);

                // 2. Try to update name (optional, don't block if it fails)
                try {
                    await updateProfile(userCredential.user, { displayName: name });
                } catch (profileErr) {
                    console.error("Profile update failed but account was created:", profileErr);
                }

                // 3. Redirect to dashboard
                window.location.href = "dashboard.html";
            } catch (error) {
                console.error("Signup error:", error);
                if (error.code === 'auth/network-request-failed') {
                    alert("Network error. Please check your internet and try again. It might take a moment to connect.");
                } else {
                    alert(error.message);
                }
            }
        });

        // Login Logic
        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = loginForm.querySelector('input[type="email"]').value;
            const password = loginForm.querySelector('input[type="password"]').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "dashboard.html";
            } catch (error) {
                alert("Login Failed: " + error.message);
            }
        });

        // Google Login Logic
        const googleBtn = document.querySelector('.btn-google');
        googleBtn.addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "dashboard.html";
            } catch (error) {
                alert(error.message);
            }
        });
    </script>
</body>

</html>
